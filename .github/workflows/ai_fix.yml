name: Gemini-AI-Fix-Agent
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix_job:
    # Issueに "/fix" と書かれた時だけ起動
    if: contains(github.event.comment.body, '/fix')
    runs-on: ubuntu-latest
    steps:
      - name: PR Agent Action
        uses: Codium-ai/pr-agent@main
        env:
          # ここがGemini APIを確実に通すための最新の記述です
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # モデル名と基本設定
          CONFIG.MODEL: "gemini/gemini-1.5-flash"
          PR_AGENT.COMMAND: "/fix"
          PR_AGENT.AT_MERGE: "true"
