name: Gemini-AI-Fix-Agent
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix_job:
    if: contains(github.event.comment.body, '/fix')
    runs-on: ubuntu-latest
    steps:
      - name: PR Agent Action
        uses: Codium-ai/pr-agent@main
        env:
          # ここをPR-Agentが100%認識する「GEMINI.KEY」に固定します
          GEMINI.KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 基本設定
          CONFIG.MODEL: "gemini/gemini-1.5-flash"
          PR_AGENT.COMMAND: "/fix"
          PR_AGENT.AT_MERGE: "true"
