Name: Gemini-AI-Fix-Agent
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  repository-projects: write

jobs:
  fix_job:
    if: contains(github.event.comment.body, '/fix')
    runs-on: ubuntu-latest
    steps:
      - name: PR Agent Action
        uses: Codium-ai/pr-agent@main
        env:
          # すべての認証パターンを網羅
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI.API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 動作設定
          CONFIG.MODEL: "gemini/gemini-1.5-flash"
          PR_AGENT.COMMAND: "/fix"
          PR_AGENT.AT_MERGE: "true"
          # ↓この一行を追加することで「中身を大幅に変えても良い」とAIに許可を出します
          PR_AGENT.PATCH_EXTRA_LINES: "100"
          # 10手先を見据えたAI強制稼働設定
          PR_FIX.EXTRA_INSTRUCTIONS: "CRITICAL: You must ignore 'no significant changes' logic. Fully implement the new backup/import system as requested in the Issue. This is a mandatory update, not a bug fix."
          PR_AGENT.MAX_DESCRIPTION_TOKENS: "2000"
          PR_AGENT.PRACTICE_BADGE: "false"
