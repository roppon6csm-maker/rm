<script>
    // --- 中略 (既存の変数定義などは維持) ---

    // --- Gmail連携強化 Ver.1.58 ---
    function showGmailConfirm(cardId, listId) {
        const cardData = db.find(x => x.id === cardId).card;
        const listData = db.find(x => x.id === listId).list;
        
        const to = listData.adress || "";
        const subject = cardData.t || "";
        const body = cardData.b || "";

        document.getElementById('gm-to').innerText = to;
        document.getElementById('gm-sub').innerText = subject;
        document.getElementById('gm-body').innerText = body;
        
        document.getElementById('gm-to-full').value = to;
        document.getElementById('gm-sub-full').value = subject;
        document.getElementById('gm-body-full').value = body;

        const mailtoUrl = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        const btnLink = document.getElementById('btn-gmail-link');
        btnLink.href = mailtoUrl;

        // Ver.1.58: ボタンクリック時に強制的に本文をコピーする
        btnLink.onclick = (e) => {
            const bodyTxt = document.getElementById('gm-body-full').value;
            navigator.clipboard.writeText(bodyTxt).then(() => {
                toast("本文をコピーしました！<br>Gmailへ移動します...");
            });
            // 1秒後に確認画面を閉じる
            setTimeout(() => { document.getElementById('ed-gmail-confirm').style.display='none'; }, 1000);
        };

        document.getElementById('ed-contact').style.display = 'none';
        document.getElementById('ed-gmail-confirm').style.display = 'flex';
    }

    // データ移行用：全データをエクスポートする新機能
    function exportAllData() {
        const fullData = { db: db, conf: conf };
        navigator.clipboard.writeText(JSON.stringify(fullData)).then(() => {
            toast("全データをコピーしました！<br>新しい環境で貼り付けてください");
        });
    }

    function importAllData() {
        const input = prompt("コピーしたデータ(JSON)を貼り付けてください");
        if (input) {
            try {
                const parsed = JSON.parse(input);
                if (parsed.db && parsed.conf) {
                    db = parsed.db; conf = parsed.conf;
                    saveAll(); localStorage.setItem(CK, JSON.stringify(conf));
                    location.reload();
                }
            } catch(e) { alert("データの形式が正しくありません"); }
        }
    }
</script>
