<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RopMemo v1.93</title>
    <style>
        :root {
            --bg-cate01: #D9D2E9; --bg-cate02: #EAD1DC; --bg-cate03: #FFF2CC; --bg-cate04: #D1EAF0;
            --bg-none: #C2B4B4; --base-grey: #B7B7B7; --cur-bg: #D9D2E9;
            --f-title: 7px; --f-body: 8px; --f-url: 7px;
        }
        * { 
            box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }
        body { background-color: #000; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; overflow: hidden; position: relative; }
        
        /* タップエフェクト */
        .tap-ripple {
            position: fixed; width: 30px; height: 30px; background: rgba(255, 255, 255, 0.4);
            border-radius: 50%; pointer-events: none; transform: scale(0);
            animation: ripple-ani 0.4s ease-out; z-index: 9999;
        }
        @keyframes ripple-ani { to { transform: scale(2.5); opacity: 0; } }

        /* メインコンテナ（iPhone下部固定風） */
        .phone-frame {
            width: 100%; max-width: 400px; height: 92vh;
            background-color: #333; border-radius: 30px 30px 0 0;
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        /* ヘッダー */
        header {
            height: 45px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; background: #333; color: #fff; flex-shrink: 0;
        }
        .header-left { font-size: 14px; font-weight: bold; cursor: pointer; }
        .header-right { font-size: 14px; display: flex; gap: 15px; }

        /* カテゴリバー */
        .cat-bar {
            height: 40px; display: flex; background: #444; overflow-x: auto; 
            scrollbar-width: none; flex-shrink: 0;
        }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-item {
            flex: 1; min-width: 70px; display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #000; cursor: pointer; transition: opacity 0.2s;
        }
        .cat-item.active { font-weight: bold; text-decoration: underline; }
        .c-1 { background: var(--bg-cate01); } .c-2 { background: var(--bg-cate02); }
        .c-3 { background: var(--bg-cate03); } .c-4 { background: var(--bg-cate04); }
        .c-none { background: var(--bg-none); color: #fff; }

        /* コンテンツエリア */
        .content { flex: 1; overflow-y: auto; background: #555; padding: 10px; position: relative; }

        /* グリッドレイアウト */
        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            align-content: start;
        }

        /* カード共通 */
        .card {
            background: var(--cur-bg); border-radius: 8px; padding: 6px;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2); height: fit-content;
            break-inside: avoid;
        }

        /* メモカード用(CARD) */
        .card-t { font-size: var(--f-title); font-weight: bold; margin-bottom: 2px; border-bottom: 1px solid rgba(0,0,0,0.1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-b { font-size: var(--f-body); line-height: 1.2; white-space: pre-wrap; word-break: break-all; margin-bottom: 4px; }
        .card-u { font-size: var(--f-url); color: #0000EE; text-decoration: underline; word-break: break-all; margin-bottom: 4px; display: block; }
        .card-a { width: 100%; border-radius: 4px; margin-top: auto; display: block; }

        /* リストカード用(LIST) */
        .list-row { display: flex; align-items: flex-start; margin-bottom: 2px; font-size: var(--f-body); }
        .list-key { font-weight: bold; min-width: 45px; border-right: 1px solid rgba(0,0,0,0.1); margin-right: 4px; word-break: break-all; }
        .list-val { flex: 1; word-break: break-all; }

        /* フッターボタン */
        .fab {
            position: absolute; bottom: 20px; right: 20px;
            width: 50px; height: 50px; background: #fff; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 24px; cursor: pointer; z-index: 100;
        }
        .fab-menu {
            position: absolute; bottom: 80px; right: 20px;
            display: flex; flex-direction: column; gap: 10px; visibility: hidden; opacity: 0; transform: translateY(20px); transition: 0.3s; z-index: 99;
        }
        .fab-menu.show { visibility: visible; opacity: 1; transform: translateY(0); }
        .menu-item {
            width: 45px; height: 45px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer;
        }

        /* 編集・詳細モーダル */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            width: 90%; max-width: 360px; background: #fff; border-radius: 15px;
            padding: 20px; max-height: 85vh; overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 15px; font-size: 16px; border-bottom: 2px solid #333; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 4px; font-weight: bold; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
        }
        .modal-btns { display: flex; justify-content: space-between; margin-top: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: #333; color: #fff; }
        .btn-del { background: #ff4d4d; color: #fff; }
        .btn-cancel { background: #ccc; }

        /* トースト */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px;
            border-radius: 20px; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 2000;
        }
        
        /* インポートエリア */
        #import-area { display: none; width: 100%; margin-top: 10px; }
        #import-text { width: 100%; height: 100px; font-size: 10px; }

        /* 検索バー */
        .search-box {
            padding: 5px 10px; background: #444; display: none;
        }
        .search-box input {
            width: 100%; padding: 5px; border-radius: 4px; border: none; font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <header>
            <div class="header-left" onclick="toggleSearch()">RopMemo v1.93</div>
            <div class="header-right">
                <span onclick="go('none')">全</span>
                <span onclick="openExport()">出</span>
                <span onclick="openImport()">入</span>
            </div>
        </header>

        <div class="search-box" id="searchBox">
            <input type="text" id="searchInput" placeholder="検索ワード..." oninput="render()">
        </div>

        <nav class="cat-bar" id="catBar">
            <div class="cat-item c-1" onclick="go('cate01')">cate01</div>
            <div class="cat-item c-2" onclick="go('cate02')">cate02</div>
            <div class="cat-item c-3" onclick="go('cate03')">cate03</div>
            <div class="cat-item c-4" onclick="go('cate04')">cate04</div>
            <div class="cat-item c-none" onclick="go('none')">none</div>
        </nav>

        <main class="content" id="content">
            <div class="grid" id="memoGrid"></div>
        </main>

        <div class="fab-menu" id="fabMenu">
            <div class="menu-item" onclick="openModal('CARD')">📝</div>
            <div class="menu-item" onclick="openModal('LIST')">📋</div>
            <div class="menu-item" onclick="pasteNew()">📋✨</div>
        </div>
        <div class="fab" onclick="toggleFab()">＋</div>
    </div>

    <div class="modal" id="memoModal">
        <div class="modal-content">
            <h3 id="modalTitle">新規作成</h3>
            <div id="modalInputs"></div>
            <div class="modal-btns">
                <button class="btn btn-del" id="delBtn" onclick="deleteItem()">削除</button>
                <button class="btn btn-cancel" onclick="closeModal()">戻る</button>
                <button class="btn btn-save" onclick="saveItem()">保存</button>
            </div>
        </div>
    </div>

    <div id="toast">コピーしました</div>

    <script>
        let db = JSON.parse(localStorage.getItem('ropmemo_db')) || [];
        let currentCat = 'none';
        let currentEditingId = null;
        let currentType = 'CARD'; // CARD or LIST
        const L_KEYS = ['L1','L2','L3','L4','L5','L6','L7','L8','L9','L10'];

        function saveAll() { localStorage.setItem('ropmemo_db', JSON.stringify(db)); render(); }

        function fmtDate() { return new Date().toLocaleString('ja-JP'); }

        function go(cat) {
            currentCat = cat;
            document.querySelectorAll('.cat-item').forEach(el => {
                el.classList.remove('active');
                if(el.innerText === cat || (cat==='none' && el.innerText==='none')) el.classList.add('active');
            });
            const root = document.querySelector(':root');
            const colors = {cate01:'#D9D2E9', cate02:'#EAD1DC', cate03:'#FFF2CC', cate04:'#D1EAF0', none:'#C2B4B4'};
            root.style.setProperty('--cur-bg', colors[cat]);
            render();
        }

        function render() {
            const grid = document.getElementById('memoGrid');
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';

            const filtered = db.filter(item => {
                const matchCat = (currentCat === 'none') ? true : item.cat === currentCat;
                const textStr = JSON.stringify(item).toLowerCase();
                return matchCat && textStr.includes(keyword);
            }).reverse();

            filtered.forEach(item => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.onclick = () => openModal(item.card.t ? 'CARD':'LIST', item.id);

                if(item.card && item.card.t) {
                    // CARD 形式
                    cardEl.innerHTML = `
                        <div class="card-t">${item.card.t}</div>
                        <div class="card-b">${item.card.b}</div>
                        ${item.card.u ? `<div class="card-u" onclick="event.stopPropagation(); window.open('${item.card.u}')">${item.card.u}</div>`:''}
                        ${item.card.a ? `<img src="${item.card.a}" class="card-a">`:''}
                    `;
                } else if(item.list) {
                    // LIST 形式
                    let listHtml = '';
                    L_KEYS.forEach(k => {
                        if(item.list[k]) {
                            listHtml += `<div class="list-row"><div class="list-key">${k}</div><div class="list-val">${item.list[k]}</div></div>`;
                        }
                    });
                    cardEl.innerHTML = listHtml || '<div style="font-size:7px">空のリスト</div>';
                }
                grid.appendChild(cardEl);
            });
        }

        function toggleFab() { document.getElementById('fabMenu').classList.toggle('show'); }

        function toggleSearch() {
            const sb = document.getElementById('searchBox');
            sb.style.display = (sb.style.display === 'block') ? 'none' : 'block';
        }

        function openModal(type, id = null) {
            currentType = type;
            currentEditingId = id;
            const modal = document.getElementById('memoModal');
            const title = document.getElementById('modalTitle');
            const inputs = document.getElementById('modalInputs');
            const delBtn = document.getElementById('delBtn');
            
            modal.style.display = 'flex';
            delBtn.style.display = id ? 'block' : 'none';
            title.innerText = id ? '編集' : (type==='CARD' ? '新規メモ' : '新規リスト');
            
            let item = id ? db.find(x => x.id === id) : null;
            let html = `
                <div class="input-group">
                    <label>カテゴリ</label>
                    <select id="m-cat">
                        <option value="cate01" ${item?.cat==='cate01'?'selected':''}>cate01</option>
                        <option value="cate02" ${item?.cat==='cate02'?'selected':''}>cate02</option>
                        <option value="cate03" ${item?.cat==='cate03'?'selected':''}>cate03</option>
                        <option value="cate04" ${item?.cat==='cate04'?'selected':''}>cate04</option>
                        <option value="none" ${(!item || item?.cat==='none')?'selected':''}>none</option>
                    </select>
                </div>
            `;

            if(type === 'CARD') {
                html += `
                    <div class="input-group"><label>タイトル</label><input type="text" id="m-t" value="${item?.card?.t || ''}"></div>
                    <div class="input-group"><label>本文</label><textarea id="m-b" rows="5">${item?.card?.b || ''}</textarea></div>
                    <div class="input-group"><label>URL</label><input type="text" id="m-u" value="${item?.card?.u || ''}"></div>
                    <div class="input-group"><label>画像URL</label><input type="text" id="m-a" value="${item?.card?.a || ''}"></div>
                `;
            } else {
                L_KEYS.forEach(k => {
                    html += `<div class="input-group"><label>${k}</label><input type="text" id="m-${k}" value="${item?.list?.[k] || ''}"></div>`;
                });
            }
            inputs.innerHTML = html;
            if(document.getElementById('fabMenu').classList.contains('show')) toggleFab();
        }

        function closeModal() { document.getElementById('memoModal').style.display = 'none'; }

        function saveItem() {
            const cat = document.getElementById('m-cat').value;
            let newItem = { id: currentEditingId || Date.now().toString(), cat: cat, date: fmtDate(), card: {}, list: {} };

            if(currentType === 'CARD') {
                newItem.card = {
                    t: document.getElementById('m-t').value,
                    b: document.getElementById('m-b').value,
                    u: document.getElementById('m-u').value,
                    a: document.getElementById('m-a').value
                };
            } else {
                L_KEYS.forEach(k => { newItem.list[k] = document.getElementById(`m-${k}`).value; });
            }

            if(currentEditingId) {
                const idx = db.findIndex(x => x.id === currentEditingId);
                db[idx] = newItem;
            } else {
                db.push(newItem);
            }
            saveAll();
            closeModal();
        }

        function deleteItem() {
            if(!confirm('削除しますか？')) return;
            db = db.filter(x => x.id !== currentEditingId);
            saveAll();
            closeModal();
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 2000);
        }

        function openExport() {
            let tsv = "[TYPE]\tid\tcat\tdate\tt\tb\tu\ta\t" + L_KEYS.join("\t") + "\n";
            db.forEach(item => {
                const esc = (s) => (s || "").replace(/\n/g, "BR").replace(/\t/g, "TAB");
                if(item.card && item.card.t !== undefined) {
                    tsv += `[CARDS]\t${item.id}\t${item.cat}\t${item.date}\t${esc(item.card.t)}\t${esc(item.card.b)}\t${esc(item.card.u)}\t${esc(item.card.a)}\t` + L_KEYS.map(()=>"").join("\t") + "\n";
                } else {
                    tsv += `[LISTS]\t${item.id}\t${item.cat}\t${item.date}\t\t\t\t\t` + L_KEYS.map(k => esc(item.list[k])).join("\t") + "\n";
                }
            });
            navigator.clipboard.writeText(tsv).then(() => toast("TSVデータをコピーしました"));
        }

        async function openImport() {
            try {
                let text = "";
                try {
                    text = await navigator.clipboard.readText();
                } catch(e) {
                    text = prompt("データを貼り付けてください");
                }
                if(!text) return;

                const lines = text.split('\n');
                const header = lines[0].split('\t');
                if(!header.includes("[TYPE]")) {
                    // JSON形式への互換維持
                    const parsed = JSON.parse(text);
                    if(Array.isArray(parsed)) { db = parsed; saveAll(); toast("JSONインポート完了"); return; }
                }

                lines.slice(1).forEach((line, i) => {
                    if(!line.trim()) return;
                    const cols = line.split('\t');
                    const data = {};
                    header.forEach((h, idx) => {
                        let val = cols[idx] || "";
                        data[h] = val.replace(/BR/g, "\n").replace(/TAB/g, "\t");
                    });

                    const type = cols[0];
                    const id = data.id || (Date.now().toString() + "_" + i);
                    const targetIdx = db.findIndex(x => x.id === id);
                    
                    let newItem = { id: id, cat: data.cat || 'none', date: data.date || fmtDate(), card: {}, list: {} };
                    
                    if(type === '[CARDS]') {
                        newItem.card = { t: data.t, b: data.b, u: data.u, a: data.a };
                    } else if(type === '[LISTS]') {
                        L_KEYS.forEach(k => { newItem.list[k] = data[k] || ""; });
                    } else { return; }

                    if(targetIdx > -1) db[targetIdx] = newItem;
                    else db.push(newItem);
                });

                saveAll();
                toast("インポート完了");
            } catch(e) {
                alert("失敗しました。形式を確認してください。");
            }
        }

        // 高度なインポート(正規表現) - 既存維持
        function experimentalImport(text) {
            try {
                const blocks = text.split(/\[(CARDS|LISTS)\]/);
                toast("実験的機能: 未実装");
            } catch(e) { alert("失敗"); }
        }

        function createCard(v) { db.push({ id: Date.now().toString(), cat:'none', date:fmtDate(), card:{t:'メモ', b:v, u:'', a:''}, list:{} }); saveAll(); }
        async function pasteNew() { try { const t = await navigator.clipboard.readText(); if(!t) return; toggleFab(); createCard(t); go('none'); toast("クリップボードから作成"); } catch(e) { alert("ペースト失敗"); } }

        // タップエフェクト実装
        document.addEventListener('touchstart', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'tap-ripple';
            ripple.style.left = e.touches[0].clientX - 15 + 'px';
            ripple.style.top = e.touches[0].clientY - 15 + 'px';
            document.body.appendChild(ripple);
            ripple.onanimationend = () => ripple.remove();
        });

        // 初期化
        go('none');

    </script>
</body>
</html>
